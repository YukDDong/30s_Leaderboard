<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tennis League Board</title>
    <meta
      name="description"
      content="보기 전용 테니스 리그 대시보드에서 경기 현황과 순위표를 확인할 수 있습니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero-card viewer-hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Tennis League Dashboard</p>
          <h1>써티즈 리그 순위표</h1>
          <p class="hero-description">보기 전용 페이지입니다.</p>
        </div>
        <div class="viewer-hero-toolbar">
          <a class="secondary-button button-link" href="./admin.html"
            >관리자 페이지</a
          >
        </div>
      </header>

      <section
        id="configNotice"
        class="panel status-panel"
        aria-live="polite"
        hidden
      >
        <p id="configNoticeMessage" class="status-banner"></p>
      </section>

      <main class="main-grid">
        <section class="panel summary-panel" aria-labelledby="summary-heading">
          <div class="section-header">
            <div>
              <h2 id="summary-heading">진행 현황</h2>
            </div>
          </div>
          <div id="summaryCards" class="summary-grid"></div>
        </section>

        <section class="panel wide-panel" aria-labelledby="standings-heading">
          <div class="section-header">
            <div>
              <p class="section-kicker">Standings</p>
              <h2 id="standings-heading">순위표</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>팀명</th>
                  <th>경기수</th>
                  <th>승점</th>
                  <th>승</th>
                  <th>무</th>
                  <th>패</th>
                  <th>득점</th>
                  <th>실점</th>
                  <th>득실차</th>
                </tr>
              </thead>
              <tbody id="standingsBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel wide-panel" aria-labelledby="matches-heading">
          <div class="section-header">
            <div>
              <p class="section-kicker">Matches</p>
              <h2 id="matches-heading">경기 목록</h2>
            </div>
          </div>
          <div id="matchesContainer" class="matches-table-shell"></div>
          <p id="matchesMessage" class="inline-message" aria-live="polite"></p>
        </section>

        <section
          id="leagueImageSection"
          class="panel wide-panel"
          aria-labelledby="match-order-image-heading"
        >
          <div class="section-header">
            <div>
              <p class="section-kicker">Photos</p>
              <h2 id="match-order-image-heading">대진 순서 이미지</h2>
            </div>
          </div>
          <div class="league-image-frame">
            <img
              id="leagueImage"
              class="league-image"
              alt="대진 순서 이미지"
              hidden
            />
            <p id="leagueImageEmpty" class="helper-text">
              아직 등록된 대진 순서 이미지가 없습니다.
            </p>
          </div>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script type="module" src="viewer.js"></script>
  </body>
</html>
